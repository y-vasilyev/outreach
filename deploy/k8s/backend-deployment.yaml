apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: talkmeter
  labels:
    app: backend
spec:
  # Two silos for HA — each runs API + Orleans + reminders. The grain
  # layer (ConferenceLiveGrain / PresentationPulseGrain) is per-key,
  # so adding silos doesn't multiply DB work; it just spreads activations.
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Give the Orleans silo time to drain grain activations before SIGKILL.
      # Combined with the graceful-shutdown handler in Program.cs this keeps
      # in-flight pulse and feedback writes from being dropped during rolls.
      terminationGracePeriodSeconds: 45
      affinity:
        # Best-effort spread so a single node failure can't take both silos.
        # `preferredDuringScheduling` (not `required`) so the deployment
        # still rolls on small clusters where two nodes aren't always free.
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [backend]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: backend
          image: cr.yandex/crp6nndlr4elmeapikta/talkmeter-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 11111
              name: orleans-silo
            - containerPort: 30000
              name: orleans-gw
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          # /health/live is a no-check endpoint that returns 200 unless
          # the process is shutting down (k8s should not restart for
          # transient DB issues — readiness handles that).
          # /health/ready actually pings Postgres (AddNpgSql healthcheck
          # tagged "ready" in Program.cs).
          startupProbe:
            httpGet:
              path: /health/ready
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: talkmeter
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
