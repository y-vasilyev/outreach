# API (Fastify) — REST + Socket.IO on :4000.
# Health probes hit the routes defined in `apps/api/src/routes/health.ts`:
#   - /health      → no-check, 200 unless process is shutting down (liveness)
#   - /health/deep → pings Postgres + Redis (readiness)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: outreach
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: cr.yandex/__paste-cr-registry-id__/outreach-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - configMapRef:
                name: outreach-config
            - secretRef:
                name: outreach-secrets
          resources:
            requests:
              memory: "384Mi"
              cpu: "200m"
            limits:
              memory: "768Mi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /health/deep
              port: 4000
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/deep
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: outreach
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 4000
      targetPort: 4000
  type: ClusterIP
