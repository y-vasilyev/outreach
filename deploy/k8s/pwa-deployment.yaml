apiVersion: apps/v1
kind: Deployment
metadata:
  name: pwa
  namespace: talkmeter
  labels:
    app: pwa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pwa
  template:
    metadata:
      labels:
        app: pwa
    spec:
      containers:
        - name: pwa
          image: cr.yandex/crp6nndlr4elmeapikta/talkmeter-pwa:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: pwa-service
  namespace: talkmeter
spec:
  selector:
    app: pwa
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
