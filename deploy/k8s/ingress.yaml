# Single-host ingress for outreach.su.
#
# Routing (order matters in path-based matching with `use-regex`):
#   /socket.io     → api-service:4000  (long-lived WS, path preserved)
#   /api(/|$)(.*)  → api-service:4000  (REST; `/api` prefix is stripped via
#                                       rewrite-target — the api mounts
#                                       routes at root, see
#                                       apps/api/src/index.ts and
#                                       apps/web/src/lib/api.ts getBaseUrl())
#   /              → web-service:80    (Vue SPA static bundle)
#
# TLS: cert-manager (already installed in-cluster) issues a Let's Encrypt
# cert for outreach.su; the `ClusterIssuer` is named `letsencrypt`.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: outreach
  namespace: outreach
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Lifted from the original talkmeter bundle. Outreach has no media
    # upload path at the moment, but the admin UI does post zod-validated
    # campaign payloads that can grow with large channel/contact lists.
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # HSTS — 1 year + subdomains. `preload` left off intentionally: opting
    # into the browser preload list is irreversible and should be a
    # deliberate decision by the domain owner, not a default.
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-max-age: "31536000"
    nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"
    nginx.ingress.kubernetes.io/hsts-preload: "false"
    # Socket.IO uses a long-lived WS upgrade. Default nginx timeouts (60s)
    # would force a reconnect storm on every minute of idle. 1h matches
    # the socket.io-server ping interval defaults comfortably.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Required so the regex capture in /api(/|$)(.*) below works for the
    # rewrite-target.
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - outreach.su
      secretName: tls-outreach-su
  rules:
    - host: outreach.su
      http:
        paths:
          # Socket.IO. No rewrite needed — the api also mounts it at /socket.io.
          # Listed FIRST so it wins against /api when the rewrite group eats it.
          - path: /socket.io
            pathType: ImplementationSpecific
            backend:
              service:
                name: api
                port:
                  number: 4000
          # REST. `/api/foo` → `/foo` (rewrite-target /$2 strips the prefix).
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api
                port:
                  number: 4000
          # SPA catch-all. The regex group `()()` ensures rewrite-target /$2
          # resolves to the original path (it would otherwise emit "/" for
          # every request if the captures were missing).
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: web
                port:
                  number: 80
