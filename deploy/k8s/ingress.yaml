apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: talkmeter-ingress
  namespace: talkmeter
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # HSTS pin so browsers refuse plaintext after a first successful TLS
    # handshake. 1 year + subdomains is the modern default; preload is
    # left off until the domain owners explicitly request inclusion in
    # the browser preload list (irreversible).
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-max-age: "31536000"
    nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"
    nginx.ingress.kubernetes.io/hsts-preload: "false"
    # WebSocket connections (/ws/user-events, /ws/speaker-dashboard) are
    # long-lived — nginx default 60 s read/send timeouts would kill the
    # PWA's user-events stream every minute and force a reconnect storm.
    # 1 hour is conservative; the gateway sends keepalives every 30 s
    # (Program.cs WebSocketOptions.KeepAliveInterval) so idle but live
    # sockets stay healthy well within this window.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - talkmeter.ru
      secretName: tls-talkmeter-ru
    - hosts:
        - app.talkmeter.ru
      secretName: tls-app-talkmeter-ru
  rules:
    - host: app.talkmeter.ru
      http:
        paths:
          # API + WS must come BEFORE the catch-all `/` so they hit
          # backend-service, not pwa-nginx. Without these the PWA static
          # nginx tries to serve /api/* via try_files → index.html, which
          # returns 405 for POST/PUT/DELETE (try_files fallback to a
          # static file rejects non-GET methods).
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          - path: /ws/user-events
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          - path: /ws/speaker-dashboard
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pwa-service
                port:
                  number: 8080
    - host: talkmeter.ru
      http:
        paths:
          # Per-user events WS: inbox_new (NotificationBroadcastGrain →
          # IUserNotificationsGrain observers) + achievement frames
          # (UserAchievementsGrain). PWA opens one of these on bootstrap.
          - path: /ws/user-events
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          - path: /ws/speaker-dashboard
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          - path: /telegram
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          # Telegram WebApp (mini-app build of webapp/packages/mini-app).
          # Register the same URL in @BotFather's Web App settings.
          - path: /mini-app
            pathType: Prefix
            backend:
              service:
                name: mini-app-service
                port:
                  number: 8080
          - path: /feedback
            pathType: Prefix
            backend:
              service:
                name: webapp-service
                port:
                  number: 8080
          - path: /speaker-dashboard
            pathType: Prefix
            backend:
              service:
                name: webapp-service
                port:
                  number: 8080
          - path: /pc
            pathType: Prefix
            backend:
              service:
                name: webapp-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-service
                port:
                  number: 8080
