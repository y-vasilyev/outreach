# Prevents node drains from evicting both backend silos at once. With
# replicas=2 + minAvailable=1, a node maintenance event drains one silo
# at a time and the other keeps serving live conference traffic.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend
  namespace: talkmeter
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend
