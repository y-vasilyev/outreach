# Web SPA — Vue 3 + Vite build served by nginx (`infra/Dockerfile.web`,
# `infra/nginx.conf`). Single-domain prod deploy: this pod only serves
# static assets at `/`; `/api` and `/socket.io` are split off at the
# Ingress and routed to the api service directly.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: outreach
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: cr.yandex/__paste-cr-registry-id__/outreach-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "32Mi"
              cpu: "20m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: outreach
spec:
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
