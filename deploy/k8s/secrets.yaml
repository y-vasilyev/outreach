# WARNING:
# This file is committed to git with placeholder values only. Before the
# first deploy: replace every `__paste-...__` placeholder with the real
# value, OR (preferred) migrate the Secret to SealedSecrets / ExternalSecrets
# / `kubectl create secret generic outreach-secrets --from-env-file=...`
# and delete this file from git. Real values committed here = leak via
# git history; rotate immediately.
#
# Keys are consumed verbatim by:
#   apps/api/src/env.ts
#   apps/workers/src/env.ts
#   packages/llm/src/providers/openrouter.ts
#   packages/platforms/src/scrapecreators/Client.ts (SCRAPECREATORS_*)
#   packages/platforms/src/discovery/* (YANDEX_*)
#   packages/storage (S3_*)
# Renaming a key without updating the corresponding zod schema makes the
# pod crash-loop on boot with a zod parse error.
apiVersion: v1
kind: Secret
metadata:
  name: outreach-secrets
  namespace: outreach
type: Opaque
stringData:
  # External Postgres (managed). Format:
  #   postgres://USER:PASS@HOST:5432/DBNAME?schema=public&sslmode=require
  # Used by Prisma in `packages/db` for both api and workers.
  DATABASE_URL: "__paste-database-url__"

  # External Redis (managed). Format: redis://[:PASS@]HOST:6379/DB
  # Drives BullMQ queues + the runtime-feature-flag invalidation pub/sub
  # channel (`runtime-feature-flags`). api and workers share the same URL.
  REDIS_URL: "__paste-redis-url__"

  # JWT signing key for the admin auth (`apps/api/src/auth`). Min 16 bytes
  # in zod; use ≥ 32 random bytes in prod (`openssl rand -base64 48`).
  JWT_SECRET: "__paste-jwt-secret__"

  # AES key used to encrypt `tg_account.session_encrypted`, OAuth refresh
  # tokens, and other at-rest secrets in the DB. Rotating this invalidates
  # every stored session — coordinate with operators. Min 10 bytes in zod;
  # use 32 bytes hex / base64 (`openssl rand -hex 32`).
  ENCRYPTION_KEY: "__paste-encryption-key__"

  # Telegram MTProto credentials (https://my.telegram.org). TG_API_ID is
  # a number, TG_API_HASH is a hex string. Optional at boot — features
  # that depend on Telegram fail closed when absent.
  TG_API_ID: "__paste-tg-api-id__"
  TG_API_HASH: "__paste-tg-api-hash__"
  # Optional bootstrap session for a single MTProto account. In prod the
  # session is normally created/rotated via the admin UI and stored in
  # `tg_account.session_encrypted`; this var only seeds the first run.
  TG_SESSION_STRING: ""

  # Optional MTProto proxy (`apps/api/src/env.ts`, `apps/workers/src/env.ts`).
  # Leave empty if proxy is not used; non-empty TG_PROXY_TYPE activates it.
  # TG_PROXY_TYPE: "socks5" | "mtproxy" | ""
  TG_PROXY_TYPE: ""
  TG_PROXY_IP: ""
  TG_PROXY_PORT: ""
  TG_PROXY_USERNAME: ""
  TG_PROXY_PASSWORD: ""
  TG_PROXY_SECRET: ""

  # OpenRouter (LLM gateway). Used by packages/llm/src/providers/openrouter.ts.
  # HTTP_REFERER + X_TITLE are sent to OpenRouter for billing attribution.
  OPENROUTER_API_KEY: "__paste-openrouter-api-key__"
  OPENROUTER_HTTP_REFERER: "https://outreach.su"
  OPENROUTER_X_TITLE: "Outreach"

  # Yandex Cloud — Foundation Models (LLM) and Yandex Search (discovery,
  # `channel_discovery` flag). Folder id scopes API quota.
  YANDEX_API_KEY: "__paste-yandex-api-key__"
  YANDEX_DEFAULT_FOLDER_ID: "__paste-yandex-folder-id__"
  YANDEX_SEARCH_API_KEY: "__paste-yandex-search-api-key__"
  YANDEX_SEARCH_FOLDER_ID: "__paste-yandex-search-folder-id__"

  # ScrapeCreators (public channel/profile scraping). Base URL stays in
  # configmap; only the key is secret. Optional — no key = the platform
  # adapter fails closed and the affected jobs go to `assisted`.
  SCRAPECREATORS_API_KEY: "__paste-scrapecreators-api-key__"

  # Object storage (S3-compatible). Only consumed when the `object_storage`
  # runtime flag is on (`packages/storage/loadStorageConfig`).
  # FORCE_PATH_STYLE: "true" for MinIO / Yandex Object Storage, "false" for AWS.
  S3_ENDPOINT: "__paste-s3-endpoint__"
  S3_REGION: "ru-central1"
  S3_ACCESS_KEY: "__paste-s3-access-key__"
  S3_SECRET_KEY: "__paste-s3-secret-key__"
  S3_BUCKET: "outreach-media"
  S3_FORCE_PATH_STYLE: "true"

  # External Qdrant (managed). The Qdrant integration is not wired into
  # the current code path (`grep -r QDRANT` finds nothing in apps/packages
  # as of this commit) — these are forward-looking placeholders for the
  # blogger-matching / semantic-search work. Safe to leave empty until a
  # consumer is added; do not delete the keys without coordinating with
  # whoever wires Qdrant in.
  QDRANT_URL: "__paste-qdrant-url__"
  QDRANT_API_KEY: "__paste-qdrant-api-key__"
