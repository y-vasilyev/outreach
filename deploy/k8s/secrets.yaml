# WARNING:
# This file is checked into git. Real secret values committed here MUST be
# considered compromised — rotate them and migrate to a proper secret store
# (SealedSecrets / ExternalSecrets / kubectl create secret --from-env-file).
#
# Key naming: ASP.NET Core reads env-vars where `__` separates config
# sections (so `Database:ConnectionString` ↔ `Database__ConnectionString`).
# These names are consumed by Feedback.Api/Program.cs verbatim — DO NOT
# rename without updating the corresponding configuration binders.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: talkmeter
type: Opaque


